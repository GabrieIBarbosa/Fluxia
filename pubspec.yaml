name: ecommerce_dashboard
description: MVP - Dashboard de vendas para e-commerce integrado ao Firebase e Gemini (Vertex AI).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter

  # Gerenciamento de estado
  flutter_riverpod: ^2.6.1

  # Firebase Core, Auth, Banco de Dados e IA (Vertex AI / Gemini)
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_ai: ^3.11.0

  # Graficos e Data Visualization
  fl_chart: ^0.69.2

  # Manipulacao de arquivos e CSV
  file_picker: ^8.0.0+1
  excel: ^4.0.3
  csv: ^6.0.0

  # Google AdMob (Monetizacao)
  google_mobile_ads: ^5.3.0

  # Tipografia e Icones
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Formatacoes e utilitarios
  intl: ^0.20.2
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
